<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
  .header { background: #1677ff; color: #fff; padding: 16px 24px; font-size: 18px; font-weight: 600; }
  .container { max-width: 960px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1677ff; border-left: 3px solid #1677ff; padding-left: 8px; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; margin-top: 12px; }
  input, textarea, select { width: 100%; padding: 8px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; transition: border .2s; }
  input:focus, textarea:focus, select:focus { border-color: #1677ff; }
  textarea { resize: vertical; min-height: 80px; }
  .btn { display: inline-block; padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; transition: opacity .2s; }
  .btn-primary { background: #1677ff; color: #fff; }
  .btn-success { background: #52c41a; color: #fff; }
  .btn-danger { background: #ff4d4f; color: #fff; }
  .btn-default { background: #f0f0f0; color: #333; }
  .btn:hover { opacity: .85; }
  .btn + .btn { margin-left: 8px; }
  .mt { margin-top: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
  th { background: #fafafa; font-weight: 600; color: #666; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .tag-green { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
  .tag-red { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
  .tag-blue { background: #e6f4ff; color: #1677ff; border: 1px solid #91caff; }
  .log-item { padding: 10px; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
  .log-item:last-child { border-bottom: none; }
  .log-time { color: #999; font-size: 12px; }
  .modal-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-mask.show { display: flex; }
  .modal { background: #fff; border-radius: 10px; padding: 24px; width: 440px; max-width: 95vw; }
  .modal h3 { margin-bottom: 16px; }
  .cron-tips { font-size: 12px; color: #999; margin-top: 4px; }
  .flex { display: flex; gap: 10px; align-items: center; }
  .flex-1 { flex: 1; }
</style>
</head>
<body>
<div class="header">🚀 自动发布工具</div>
<div class="container">

  <!-- 手动触发 -->
  <div class="card" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="font-size:15px;font-weight:600;color:#1677ff">手动触发发布</span>
    <select id="manualPlatform" style="width:auto;flex:none">
      <option value="xianyu">闲鱼</option>
      <option value="zhihu">知乎</option>
      <option value="xiaohongshu">小红书（待接入）</option>
      <option value="douyin">抖音（待接入）</option>
      <option value="juejin">掘金（待接入）</option>
    </select>
    <button class="btn btn-success" id="manualRunBtn" onclick="manualRun()">▶ 立即执行</button>
    <span id="manualStatus" style="font-size:13px;color:#999"></span>
  </div>

  <!-- 推广配置 -->
  <div class="card">
    <h2>推广配置</h2>
    <label>推广链接</label>
    <input id="promoUrl" type="url" placeholder="https://your-promo-link.com">
    <label>产品描述（AI写文时参考）</label>
    <textarea id="promoDesc" placeholder="例如：超值流量卡，全国通用，月租低至9.9元，无合约期，随时可退"></textarea>
    <div class="mt">
      <button class="btn btn-primary" onclick="savePromo()">保存配置</button>
    </div>
  </div>

  <!-- 平台配置 -->
  <div class="card">
    <h2>平台配置</h2>
    <label>闲鱼 Cookie（登录后从浏览器开发者工具复制）</label>
    <div class="flex">
      <input class="flex-1" id="xianyuCookie" type="password" placeholder="粘贴 cookie 字符串">
      <button class="btn btn-default" onclick="toggleCookie('xianyuCookie')">显示</button>
    </div>
    <div class="mt">
      <button class="btn btn-primary" onclick="savePlatform('xianyu')">保存闲鱼配置</button>
    </div>
  </div>

  <!-- 平台配置 - 知乎 -->
  <div class="card">
    <h2>平台配置 · 知乎</h2>
    <label>知乎 Cookie（登录 zhihu.com 后从开发者工具复制）</label>
    <div class="flex">
      <input class="flex-1" id="zhihuCookie" type="password" placeholder="粘贴 cookie 字符串">
      <button class="btn btn-default" onclick="toggleCookie('zhihuCookie')">显示</button>
    </div>
    <div class="mt">
      <button class="btn btn-primary" onclick="savePlatform('zhihu')">保存知乎配置</button>
    </div>
  </div>

  <!-- 任务管理 -->
  <div class="card">
    <h2>定时任务</h2>
    <button class="btn btn-success" onclick="openAddTask()">+ 新增任务</button>
    <table style="margin-top:14px">
      <thead><tr><th>名称</th><th>平台</th><th>Cron 表达式</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="taskTable"></tbody>
    </table>
  </div>

  <!-- 发布日志 -->
  <div class="card">
    <h2>发布日志</h2>
    <button class="btn btn-default" onclick="loadLogs()" style="margin-bottom:12px">刷新</button>
    <div id="logList"></div>
  </div>

</div>

<!-- 新增任务弹窗 -->
<div class="modal-mask" id="taskModal">
  <div class="modal">
    <h3>新增定时任务</h3>
    <label>任务名称</label>
    <input id="taskLabel" placeholder="例如：闲鱼每日早上发布">
    <label>平台</label>
    <select id="taskPlatform">
      <option value="xianyu">闲鱼</option>
      <option value="zhihu">知乎</option>
      <option value="xiaohongshu">小红书（待接入）</option>
      <option value="douyin">抖音（待接入）</option>
      <option value="juejin">掘金（待接入）</option>
    </select>
    <label>Cron 表达式</label>
    <input id="taskCron" placeholder="0 9 * * *">
    <div class="cron-tips">
      常用：每天9点 → <code>0 9 * * *</code>，每天9点和18点 → <code>0 9,18 * * *</code>，每小时 → <code>0 * * * *</code>
    </div>
    <div class="mt flex">
      <button class="btn btn-primary flex-1" onclick="addTask()">确认添加</button>
      <button class="btn btn-default flex-1" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<script>
const API = '';

async function get(url) { return (await fetch(API + url)).json(); }
async function post(url, data) { return (await fetch(API + url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })).json(); }
async function put(url, data) { return (await fetch(API + url, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })).json(); }
async function del(url) { return (await fetch(API + url, { method: 'DELETE' })).json(); }

async function manualRun() {
  const btn = document.getElementById('manualRunBtn');
  const status = document.getElementById('manualStatus');
  const platform = document.getElementById('manualPlatform').value;
  btn.disabled = true;
  btn.textContent = '执行中...';
  status.textContent = '正在抓取热点、生成软文，请稍候...';
  status.style.color = '#1677ff';
  try {
    const result = await post('/api/run', { platform });
    status.textContent = result.success ? `✅ ${result.message}` : `❌ ${result.message}`;
    status.style.color = result.success ? '#52c41a' : '#ff4d4f';
    loadLogs();
  } catch (e) {
    status.textContent = '❌ 请求失败';
    status.style.color = '#ff4d4f';
  }
  btn.disabled = false;
  btn.textContent = '▶ 立即执行';
}

async function init() {
  const config = await get('/api/config');
  document.getElementById('promoUrl').value = config.promoUrl || '';
  document.getElementById('promoDesc').value = config.promoDesc || '';
  document.getElementById('xianyuCookie').value = config.platforms?.xianyu?.cookie || '';
  document.getElementById('zhihuCookie').value = config.platforms?.zhihu?.cookie || '';
  loadTasks();
  loadLogs();
}

async function savePromo() {
  await post('/api/config/promo', {
    promoUrl: document.getElementById('promoUrl').value,
    promoDesc: document.getElementById('promoDesc').value
  });
  alert('保存成功');
}

async function savePlatform(name) {
  const cookieEl = document.getElementById(name + 'Cookie');
  if (!cookieEl) return;
  await post(`/api/config/platform/${name}`, { cookie: cookieEl.value, enabled: true });
  alert(`${name} 配置已保存`);
}

function toggleCookie(id = 'xianyuCookie') {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

async function loadTasks() {
  const tasks = await get('/api/tasks');
  const tbody = document.getElementById('taskTable');
  tbody.innerHTML = tasks.map(t => `
    <tr>
      <td>${t.label || t.id}</td>
      <td><span class="tag tag-blue">${t.platform}</span></td>
      <td><code>${t.cron}</code></td>
      <td><span class="tag ${t.enabled ? 'tag-green' : 'tag-red'}">${t.enabled ? '启用' : '停用'}</span></td>
      <td>
        <button class="btn btn-success" onclick="runNow('${t.id}')">立即执行</button>
        <button class="btn btn-default" onclick="toggleTask('${t.id}', ${!t.enabled})">${t.enabled ? '停用' : '启用'}</button>
        <button class="btn btn-danger" onclick="deleteTask('${t.id}')">删除</button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="5" style="text-align:center;color:#999;padding:20px">暂无任务</td></tr>';
}

async function runNow(id) {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '执行中...';
  const result = await post(`/api/tasks/${id}/run`, {});
  btn.disabled = false;
  btn.textContent = '立即执行';
  alert(result.success ? `✅ ${result.message}` : `❌ ${result.message}`);
  loadLogs();
}

async function toggleTask(id, enabled) {
  await put(`/api/tasks/${id}`, { enabled });
  loadTasks();
}

async function deleteTask(id) {
  if (!confirm('确认删除此任务？')) return;
  await del(`/api/tasks/${id}`);
  loadTasks();
}

function openAddTask() { document.getElementById('taskModal').classList.add('show'); }
function closeModal() { document.getElementById('taskModal').classList.remove('show'); }

async function addTask() {
  const label = document.getElementById('taskLabel').value;
  const platform = document.getElementById('taskPlatform').value;
  const cron = document.getElementById('taskCron').value.trim();
  if (!cron) return alert('请填写 Cron 表达式');
  await post('/api/tasks', { label, platform, cron, enabled: true });
  closeModal();
  loadTasks();
}

async function loadLogs() {
  const logs = await get('/api/logs');
  const el = document.getElementById('logList');
  el.innerHTML = logs.length ? logs.map(l => `
    <div class="log-item">
      <span class="tag ${l.success ? 'tag-green' : 'tag-red'}">${l.success ? '成功' : '失败'}</span>
      <span class="tag tag-blue" style="margin:0 6px">${l.platform}</span>
      <span class="log-time">${new Date(l.time).toLocaleString('zh-CN')}</span>
      <div style="margin-top:4px;color:#555">${l.message}</div>
      ${l.articlePreview ? `<div style="margin-top:4px;color:#999;font-size:12px">${l.articlePreview}...</div>` : ''}
    </div>
  `).join('') : '<div style="color:#999;text-align:center;padding:20px">暂无日志</div>';
}

init();
</script>
</body>
</html>
